<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diccionario de Etiquetas HTML</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .category-card { transition: transform 0.2s; border: none; shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .category-card:hover { transform: translateY(-5px); }
        .list-group-item a { text-decoration: none; color: #0d6efd; font-weight: 500; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-5">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Guía Completa de HTML5</span>
    </div>
</nav>

<div class="container">
    <div class="text-center mb-5">
        <h1 class="display-4">Catálogo de Etiquetas</h1>
        <p class="lead text-muted">Selecciona una categoría para explorar sus etiquetas y ejemplos.</p>
    </div>

    <div class="row g-4">

        <div class="col-md-4">
            <div class="card category-card h-100">
                <div class="card-header bg-primary text-white font-weight-bold">
                    🏗️ Estructura
                </div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item" th:each="e : ${etiquetas}" th:if="${e.categoria == 'Estructura'}">
                        <a th:href="@{'/etiqueta/' + ${e.id}}" th:text="${e.nombre}"></a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card category-card h-100">
                <div class="card-header bg-success text-white font-weight-bold">
                    📝 Texto
                </div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item" th:each="e : ${etiquetas}" th:if="${e.categoria == 'Texto'}">
                        <a th:href="@{'/etiqueta/' + ${e.id}}" th:text="${e.nombre}"></a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card category-card h-100">
                <div class="card-header bg-warning text-dark font-weight-bold">
                    ⌨️ Formularios
                </div>
                <ul class="list-group list-group-flush">
                    <li class="list-group-item" th:each="e : ${etiquetas}" th:if="${e.categoria == 'Formularios'}">
                        <a th:href="@{'/etiqueta/' + ${e.id}}" th:text="${e.nombre}"></a>
                    </li>
                </ul>
            </div>
        </div>

    </div>
</div>

<footer class="text-center py-4 mt-5 text-muted">
    <p>&copy; 2026 - Práctica Spring Boot</p>
</footer>

</body>
</html>
