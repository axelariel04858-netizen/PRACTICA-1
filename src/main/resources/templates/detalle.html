<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DETALLES DE LAS ETIQUETAS</title>
</head>
<body>
<h1 th:text="'Etiqueta: ' + ${etiqueta.nombre}"></h1>
<p th:text="${etiqueta.descripcion}"></p>

<h3>Ejemplo de Código:</h3>
<pre><code th:text="${etiqueta.ejemploCodigo}"></code></pre>

<h3>Resultado en Vivo:</h3>
<div class="border p-3" th:utext="${etiqueta.ejemploReal}"></div>

<div class="mt-4">
    <a th:if="${anterior}" th:href="@{'/etiqueta/' + ${anterior}}" class="btn">Anterior</a>
    <a href="/" class="btn">Inicio</a>
    <a th:if="${siguiente}" th:href="@{'/etiqueta/' + ${siguiente}}" class="btn">Siguiente</a>
</div>
</body>
</html>
